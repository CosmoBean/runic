# Runic configuration
# Copy to ~/.config/runic/config.yaml

machine:
  name: "My Machine"        # Displayed in mobile app / web UI

server:
  host: 0.0.0.0              # Bind address
  port: 8765                 # WebSocket port

auth:
  token_hash: ""             # SHA-256 hash (generated by `runic setup` or `runic token rotate`)
  require_token: true        # Require daemon token even behind reverse proxy/auth gateway
  token_rotation_days: 30    # Operational policy metadata for token rotation cadence
  rate_limit: 5              # Max failed auth attempts per minute per IP
  lockout_minutes: 15        # Lockout duration after rate limit hit

tls:
  mode: self-signed          # Options: self-signed, custom, none
  cert: ""                   # Path to cert file (custom mode only)
  key: ""                    # Path to key file (custom mode only)

sessions:
  session_mode: auto         # auto|pty|tmux (auto uses tmux when installed)
  default_shell: ""          # Auto-detect from $SHELL (fallback: /bin/sh)
  login_shell: true          # Start sessions as login shell so profile PATH/tooling is loaded
  start_dir: ""              # Session initial cwd (default: your home directory)
  max_sessions: 20           # Maximum concurrent sessions
  pty_buffer_size: 16384     # Bytes per PTY read (16KB)
  ws_write_buffer: 64        # Output channel slots (64 * 16KB = 1MB max buffer)
  throttle_threshold_mb: 1   # Enter throttle mode above this buffer size

security:
  allowed_origins: []        # Allowed WebSocket Origin values (e.g. ["https://terminal.example.com"])
  trust_proxy_headers: false # Trust X-Forwarded-For only from trusted_proxy_cidrs
  trusted_proxy_cidrs:       # CIDRs allowed to supply proxy headers
    - 127.0.0.1/32
    - ::1/128
